org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Disable Kotlin incremental compilation to avoid cross-drive incremental cache issues
# (fixes errors when Kotlin incremental caches reference paths on different drives)
kotlin.incremental=false
